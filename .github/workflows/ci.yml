name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      GEMINI_API_KEY: test-key-ci
      MONGODB_URI: mongodb://localhost:27017/cortex_test

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests with coverage
        run: npm run test:backend -- --coverage --coverageThreshold='{"global":{"lines":40,"functions":40,"branches":30}}'

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          REACT_APP_API_URL: https://cortex-api.onrender.com
          CI: false  # CRA treats warnings as errors; remove once all warnings are fixed
